data:
  dataset: "glue/sst2"
  max_length: 128

training:
  batch_size: 32
  num_epochs: 5
  weight_decay: 0.01
  warmup_ratio: 0.1
  max_grad_norm: 1.0
  seed: 42

model:
  pretrained: "bert-base-uncased"
  num_labels: 2

output:
  results_dir: "results"
  figures_dir: "figures"
  save_model: false
